<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP Showcase</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- NAV -->
    <nav class="nav">
      <div class="logo">GS<span>AP</span></div>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <p class="eyebrow" id="eyebrow">✦ Powered by GSAP</p>
      <h1 class="title" id="title">Animate <span>Everything.</span></h1>
      <p class="subtitle" id="subtitle">Smooth animations with GreenSock.</p>
      <button class="btn" id="btn">Explore Now</button>
    </section>

    <!-- CARDS -->
    <section class="cards">
      <div class="card" id="card1">⚡ 60fps</div>
      <div class="card" id="card2">🎯 ScrollTrigger</div>
      <div class="card" id="card3">🌀 Timeline</div>
    </section>

    <!-- FOOTER -->
    <footer class="footer" id="footer">
      <p>Made with <span>♥</span> using GSAP &amp; Vanilla JS</p>
      <p class="footer-sub">© 2025 GSAP Showcase</p>
    </footer>

    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
