<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Grid lines for depth feel -->
  <g stroke="#0AE44820" stroke-width="1">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
  </g>
  <!-- Image icon outline -->
  <rect x="140" y="90" width="120" height="90" rx="8" fill="none" stroke="#0AE448" stroke-width="2.5"/>
  <!-- Mountain / landscape icon inside -->
  <polyline points="152,168 176,134 196,152 216,124 248,168" fill="none" stroke="#0AE448" stroke-width="2" stroke-linejoin="round"/>
  <!-- Sun circle -->
  <circle cx="228" cy="112" r="10" fill="none" stroke="#0AE448" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#79FFE1" text-anchor="middle" opacity="0.8">placeholder</text>
  <!-- Subtle dot-grid corners for premium feel -->
  <circle cx="8" cy="8" r="2" fill="#0AE448" opacity="0.4"/>
  <circle cx="392" cy="8" r="2" fill="#0AE448" opacity="0.4"/>
  <circle cx="8" cy="292" r="2" fill="#0AE448" opacity="0.4"/>
  <circle cx="392" cy="292" r="2" fill="#0AE448" opacity="0.4"/>
</svg>
